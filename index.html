<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Website Pelaporan Bencana — Laporkan bencana secara cepat dan akurat.">
  <meta name="theme-color" content="#ff6b35">
  <title>LAPOR BENCANA — Pelaporan Darurat</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="apple-touch-icon" href="assets/favicon.svg">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══ Header ═══ -->
  <header class="header">
    <span class="header-icon">🚨</span>
    <h1>LAPOR BENCANA</h1>
    <p>Sampaikan laporanmu — bantu petugas bertindak cepat</p>
  </header>

  <!-- ═══ Main Content ═══ -->
  <main class="container">

    <!-- Info Pelapor -->
    <section class="card">
      <div class="card-title"><span class="icon">👤</span> Informasi Pelapor</div>
      <div class="form-group">
        <label for="nama">Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Contoh: Ahmad Rizki" required>
      </div>
      <div class="form-group">
        <label for="jenis">Jenis Bencana</label>
        <select id="jenis" required>
          <option value="" disabled selected>Pilih jenis bencana…</option>
          <option value="🌊 Banjir">🌊 Banjir</option>
          <option value="🔥 Kebakaran">🔥 Kebakaran</option>
          <option value="🏔️ Gempa Bumi">🏔️ Gempa Bumi</option>
          <option value="🌋 Gunung Meletus">🌋 Gunung Meletus</option>
          <option value="🌊 Tsunami">🌊 Tsunami</option>
          <option value="🌪️ Angin Puting Beliung">🌪️ Angin Puting Beliung</option>
          <option value="⛰️ Tanah Longsor">⛰️ Tanah Longsor</option>
          <option value="🌡️ Kemarau / Kekeringan">🌡️ Kemarau / Kekeringan</option>
          <option value="⚡ Lainnya">⚡ Lainnya</option>
        </select>
      </div>
      <div class="form-group">
        <label for="deskripsi">Deskripsi Keadaan</label>
        <textarea id="deskripsi" placeholder="Jelaskan situasi bencana, korban, kerusakan, dll." required></textarea>
      </div>
    </section>

    <!-- Lokasi -->
    <section class="card">
      <div class="card-title"><span class="icon">📍</span> Lokasi Bencana</div>
      <p class="map-hint">Geser marker 📌 ke lokasi bencana, atau gunakan GPS.</p>
      <div id="map"></div>
      <div class="map-actions">
        <button class="btn-ghost" id="btnGps">📡 Gunakan Lokasi Saya</button>
        <button class="btn-ghost" id="btnReset">🔄 Reset Peta</button>
      </div>
      <div class="coord-badge" id="coordBadge">Koordinat: 4.47000, 97.94000 (Kota Langsa)</div>
    </section>

    <!-- Submit -->
    <button class="btn-submit" id="btnSubmit">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">🚨 Kirim Laporan Darurat</span>
    </button>

    <!-- Laporan Terbaru -->
    <section class="card" id="reportsCard" style="display:none">
      <div class="card-title"><span class="icon">📋</span> Laporan Terbaru</div>
      <div class="reports-actions">
        <button class="btn-ghost btn-sm" id="btnRefresh">🔄 Muat Ulang</button>
        <span class="reports-count" id="reportsCount"></span>
      </div>
      <div id="reportsList"></div>
    </section>

  </main>

  <!-- ═══ Footer (styled from COPYRIGHT.md) ═══ -->
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-crown">🚨</span>
      <span class="footer-text" id="copyright-text"></span>
      <span class="footer-crown">🚨</span>
    </div>
  </footer>

  <!-- ═══ Toast Notification ═══ -->
  <div class="toast-overlay" id="toastOverlay">
    <div class="toast-card">
      <div class="toast-icon" id="toastIcon">✅</div>
      <h3 id="toastTitle">Laporan Terkirim!</h3>
      <p id="toastMsg">Petugas akan segera menindaklanjuti laporan Anda.</p>
      <button class="toast-btn" id="toastClose">Tutup</button>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App JS -->
  <script src="js/app.js"></script>
</body>
</html>
